kind = "web"
previewPath = "/"
title = "Numerology CMS"
version = "1.0.0"
id = "artifacts/numerology-cms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26207

[services.development]
run = "pnpm --filter @workspace/numerology-cms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/numerology-cms", "run", "build" ]
publicDir = "artifacts/numerology-cms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26207"
BASE_PATH = "/"
