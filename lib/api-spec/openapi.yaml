      type: object
      properties:
        name: { type: string }
        description: { type: string }
      required: [name]

    RuleCategoryUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }

    ReportRequest:
      type: object
      properties:
        name: { type: string }
        date_of_birth:
          type: string
          description: "ISO date string: YYYY-MM-DD"
        year_offset:
          type: integer
          description: "Shift the 'as of' date by N years to preview a future/past personal year, month & day cycle (e.g. -1, 0, 1). Defaults to 0."
      required: [name, date_of_birth]

    NumerologyReport:
      type: object
      properties:
        subject:
          type: object
          properties:
            name: { type: string }
            date_of_birth: { type: string }
          required: [name, date_of_birth]
        numbers:
          $ref: "#/components/schemas/CalculatedNumbers"
        personality_analysis:
          $ref: "#/components/schemas/ReportSection"
        career_analysis:
          $ref: "#/components/schemas/CareerSection"
        relationship_analysis:
          $ref: "#/components/schemas/RelationshipSection"
        health_analysis:
          $ref: "#/components/schemas/HealthSection"
        money_analysis:
          $ref: "#/components/schemas/ReportSection"
        travel_analysis:
          $ref: "#/components/schemas/ReportSection"
        remedies:
          type: array
          items:
            $ref: "#/components/schemas/Remedy"
        future_predictions:
          $ref: "#/components/schemas/FuturePredictions"
        lo_shu:
          $ref: "#/components/schemas/LoShuResult"
        astro_numero:
          $ref: "#/components/schemas/AstroNumeroResult"
        interpretations:
          type: array
          items:
            $ref: "#/components/schemas/RuleInterpretation"
        generated_at: { type: string }
        year_offset: { type: integer, description: "The year offset applied when computing this report's personal year/month/day (0 = current cycle)" }
      required: [subject, numbers, personality_analysis, career_analysis, relationship_analysis, health_analysis, money_analysis, travel_analysis, remedies, future_predictions, lo_shu, astro_numero, interpretations, generated_at, year_offset]

    ReportSection:
      type: object
      properties:
        title: { type: string }
        number: { type: integer }
        meanings:
          type: array
          items:
            $ref: "#/components/schemas/NumberMeaning"
        summary: { type: string }
      required: [title, number, meanings, summary]

    CareerSection:
      type: object
      properties:
        title: { type: string }
        number: { type: integer }
        professions:
          type: array
          items:
            $ref: "#/components/schemas/ProfessionMapping"
        meanings:
          type: array
          items:
            $ref: "#/components/schemas/NumberMeaning"
        summary: { type: string }
      required: [title, number, professions, meanings, summary]

