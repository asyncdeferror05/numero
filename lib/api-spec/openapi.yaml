      properties:
        title: { type: string }
        number: { type: integer }
        health_areas:
          type: array
          items:
            $ref: "#/components/schemas/HealthMapping"
        meanings:
          type: array
          items:
            $ref: "#/components/schemas/NumberMeaning"
        summary: { type: string }
      required: [title, number, health_areas, meanings, summary]

    FuturePredictions:
      type: object
      properties:
        personal_year: { type: integer }
        personal_month: { type: integer }
        personal_day: { type: integer }
        year_meaning:
          type: array
          items:
            $ref: "#/components/schemas/NumberMeaning"
        month_meaning:
          type: array
          items:
            $ref: "#/components/schemas/NumberMeaning"
        interpretations:
          type: array
          items:
            $ref: "#/components/schemas/RuleInterpretation"
      required: [personal_year, personal_month, personal_day, year_meaning, month_meaning, interpretations]

    CalculatedNumbers:
      type: object
      properties:
        birthday_number: { type: integer }
        destiny_number: { type: integer }
        personality_number: { type: ["integer", "null"] }
        personal_year: { type: integer }
        personal_month: { type: integer }
        personal_day: { type: integer }
        cycle_year: { type: integer, description: "The birthday-anchored cycle year used to compute personal_year (resets on the birthday, not Jan 1)" }
      required: [birthday_number, destiny_number, personal_year, personal_month, personal_day, cycle_year]

    RuleInterpretation:
      type: object
      properties:
        rule_id: { type: integer }
        rule_name: { type: string }
        rule_type: { type: string }
        keywords:
          type: array
          items: { type: string }
        strengths:
          type: array
          items: { type: string }
        weaknesses:
          type: array
          items: { type: string }
        recommendations:
          type: array
          items: { type: string }
        description: { type: ["string", "null"] }
      required: [rule_id, rule_name, rule_type, keywords, strengths, weaknesses, recommendations]

    LoShuResult:
      type: object
      properties:
        digit_pool:
          type: array
          items: { type: integer }
        grid:
          type: array
          items:
            type: array
            items: { type: integer }
        missing_numbers:
          type: array
          items: { type: integer }
        repeated_numbers:
          type: array
          items:
            $ref: "#/components/schemas/RepeatedEntry"
        active_arrows:
          type: array
          items: { type: string }
        missing_interpretations:
          type: array
          items:
            $ref: "#/components/schemas/MissingNumberRule"
        repeated_interpretations:
          type: array
          items:
            $ref: "#/components/schemas/RepeatedNumberRule"
        arrow_interpretations:
          type: array
          items:
            $ref: "#/components/schemas/ArrowRule"
      required: [digit_pool, grid, missing_numbers, repeated_numbers, active_arrows, missing_interpretations, repeated_interpretations, arrow_interpretations]

    RepeatedEntry:
      type: object
      properties:
        number: { type: integer }
        count: { type: integer }
        label: { type: string }
      required: [number, count, label]

    AstroNumeroResult:
      type: object
      description: >
        Astro Numero grid — built only from the day, month, and the last two
        digits of the birth year (no full 4-digit year, no destiny/other
        numbers). Duplicate digits are collapsed; each present number is
        mentioned only once.
      properties:
        digit_pool:
          type: array
          items: { type: integer }
          description: Unique digits (1-9) present, deduplicated
        grid:
          type: array
          items:
            type: array
            items: { type: integer }
          description: "3x3 grid in fixed layout [[3,1,9],[6,7,5],[2,8,4]] — each cell is the number if present, 0 if absent"
        missing_numbers:
          type: array
          items: { type: integer }
      required: [digit_pool, grid, missing_numbers]
