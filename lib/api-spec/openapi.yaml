components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardStats:
      type: object
      properties:
        totalRules: { type: integer }
        activeRules: { type: integer }
        totalFormulas: { type: integer }
        activeFormulas: { type: integer }
        totalKnowledgeEntries: { type: integer }
        totalLoShuRules: { type: integer }
        totalNumberMeanings: { type: integer }
        rulesByType:
          type: array
          items:
            $ref: "#/components/schemas/RuleTypeCount"
        recentRules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
      required: [totalRules, activeRules, totalFormulas, activeFormulas, totalKnowledgeEntries, totalLoShuRules, totalNumberMeanings, rulesByType, recentRules]

    RuleTypeCount:
      type: object
      properties:
        type: { type: string }
        count: { type: integer }
      required: [type, count]

    Rule:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        rule_type: { type: string }
        description: { type: ["string", "null"] }
        condition_json: { type: object, additionalProperties: true }
        result_json: { type: object, additionalProperties: true }
        priority: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string }
        updated_at: { type: string }
      required: [id, name, rule_type, condition_json, result_json, priority, is_active, created_at, updated_at]

    RuleInput:
      type: object
      properties:
        name: { type: string }
        rule_type: { type: string }
        description: { type: string }
        condition_json: { type: object, additionalProperties: true }
        result_json: { type: object, additionalProperties: true }
        priority: { type: integer }
        is_active: { type: boolean }
      required: [name, rule_type, condition_json, result_json]

    RuleUpdate:
      type: object
      properties:
        name: { type: string }
        rule_type: { type: string }
        description: { type: string }
        condition_json: { type: object, additionalProperties: true }
        result_json: { type: object, additionalProperties: true }
        priority: { type: integer }
        is_active: { type: boolean }

    Formula:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        formula_type: { type: string }
        formula_expression: { type: string }
        description: { type: ["string", "null"] }
        version: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string }
        updated_at: { type: string }
      required: [id, name, formula_type, formula_expression, version, is_active, created_at, updated_at]

    FormulaInput:
      type: object
      properties:
        name: { type: string }
        formula_type: { type: string }
        formula_expression: { type: string }
        description: { type: string }
        version: { type: integer }
        is_active: { type: boolean }
      required: [name, formula_type, formula_expression]

    FormulaUpdate:
      type: object
      properties:
        name: { type: string }
        formula_type: { type: string }
        formula_expression: { type: string }
        description: { type: string }
        version: { type: integer }
        is_active: { type: boolean }

    FormulaTestInput:
      type: object
      properties:
        day: { type: integer }
        month: { type: integer }
        year: { type: integer }
        name: { type: string }
