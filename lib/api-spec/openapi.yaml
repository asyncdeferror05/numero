        number: { type: integer }
        mappings:
          type: array
          items:
            $ref: "#/components/schemas/RelationshipMapping"
        meanings:
          type: array
          items:
            $ref: "#/components/schemas/NumberMeaning"
        summary: { type: string }
      required: [title, number, mappings, meanings, summary]

