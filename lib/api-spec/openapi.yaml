            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Formula"
    post:
      operationId: createFormula
      tags: [formulas]
      summary: Create a formula
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormulaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Formula"

  /formulas/{id}:
    get:
      operationId: getFormula
      tags: [formulas]
      summary: Get a formula by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Formula
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Formula"
    patch:
      operationId: updateFormula
      tags: [formulas]
      summary: Update a formula
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormulaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Formula"
    delete:
      operationId: deleteFormula
      tags: [formulas]
      summary: Delete a formula
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /formulas/{id}/duplicate:
    post:
      operationId: duplicateFormula
      tags: [formulas]
      summary: Clone a formula as a new version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Cloned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Formula"

  /formulas/{id}/toggle:
    patch:
      operationId: toggleFormula
      tags: [formulas]
      summary: Toggle formula active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Formula"

  /formulas/{id}/activate:
    post:
      operationId: activateFormula
      tags: [formulas]
      summary: Set this formula as the active version for its type (deactivates all others of same type)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Formula"
        "404":
          description: Not found

  /formulas/{id}/test:
    post:
      operationId: testFormula
      tags: [formulas]
      summary: Test a formula expression with sample inputs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormulaTestInput"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormulaTestResult"
        "404":
          description: Not found

  /formulas/dsl-reference:
    get:
      operationId: getFormulaDslReference
